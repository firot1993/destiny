name = "destiny-proxy"
main = "src/index.js"
compatibility_date = "2024-01-01"

[placement]
mode = "smart"

# Global daily limit via Durable Object
[[durable_objects.bindings]]
name = "DAILY_LIMITER"
class_name = "DailyLimitDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DailyLimitDurableObject"]

# Optional: KV namespace for per-IP per-minute rate limiting
# Uncomment after creating: wrangler kv:namespace create RATE_LIMIT
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "your-kv-namespace-id"

[vars]
MAX_REQUESTS_PER_MINUTE = "30"
MAX_REQUESTS_PER_DAY = "1000"
ALLOWED_ORIGINS = "https://firot1993.github.io"
SITE_URL = ""

# Secrets (set via wrangler secret put):
# - ANTHROPIC_API_KEY
# - OPENROUTER_API_KEY
