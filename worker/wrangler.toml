name = "destiny-proxy"
main = "src/index.js"
compatibility_date = "2024-01-01"

[placement]
mode = "smart"
hint = "wnam"

# Optional: KV namespace for rate limiting
# Uncomment after creating: wrangler kv:namespace create RATE_LIMIT
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "your-kv-namespace-id"

[vars]
MAX_REQUESTS_PER_MINUTE = "30"
ALLOWED_ORIGINS = "https://firot1993.github.io"
SITE_URL = ""

# Secrets (set via wrangler secret put):
# - ANTHROPIC_API_KEY
# - OPENROUTER_API_KEY
